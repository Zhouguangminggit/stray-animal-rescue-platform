{% load static %}
<header class="site-header" id="site-header">
  <div class="site-container site-header__inner">
    <a class="site-brand" href="{% url 'home' %}" aria-label="返回首页">
      <img src="{% static 'accounts/brand/logo.png' %}" alt="" width="40" height="40">
      <span>{{ site_name }}</span>
    </a>
    <div class="header-right">
      <nav class="site-nav" aria-label="主导航">
        <a href="{% url 'home' %}">首页</a>
        <a href="{% url 'animals:list' %}">救助信息</a>
        <a href="{% url 'adoptions:list' %}">领养中心</a>
        <a href="{% url 'volunteers:community' %}">志愿者社区</a>
        <a href="{% url 'donations:list' %}">爱心捐赠</a>
        <a href="{% url 'activities:list' %}">校园活动</a>
      </nav>
      {% if user.is_authenticated %}
      <div class="user-dropdown" id="user-dropdown">
        <button class="user-dropdown__toggle" type="button" aria-expanded="false" aria-haspopup="true" aria-label="打开用户菜单">
          <span class="site-nav__avatar" aria-hidden="true">
            {% if user.avatar %}<img src="{{ user.avatar.url }}" alt="">{% else %}{{ user.display_name|slice:":1"|upper }}{% endif %}
          </span>
          <span>{{ user.display_name }}</span>
          <svg class="dropdown-arrow" width="10" height="6" viewBox="0 0 10 6" aria-hidden="true">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="user-dropdown__menu" role="menu">
          <a href="{% url 'accounts:profile' %}" role="menuitem">
            <span>👤</span> 个人资料
          </a>
          <a href="{% url 'notifications:list' %}" role="menuitem">
            <span>🔔</span> 通知
          </a>
          <a href="{% url 'animals:my_rescues' %}" role="menuitem">
            <span>🐾</span> 我的救助
          </a>
          <a href="{% url 'adoptions:mine' %}" role="menuitem">
            <span>🏡</span> 我的领养
          </a>
          {% if user.is_staff %}
          <a href="{% url 'admin:index' %}" role="menuitem">
            <span>⚙️</span> 管理后台
          </a>
          {% endif %}
          <hr class="user-dropdown__divider">
          <form method="post" action="{% url 'accounts:logout' %}" role="menuitem">
            {% csrf_token %}
            <button type="submit">退出</button>
          </form>
        </div>
      </div>
      {% else %}
      <div class="auth-links">
        <a href="{% url 'accounts:login' %}">登录</a>
        <a class="site-nav__primary" href="{% url 'accounts:register' %}">开始使用</a>
      </div>
      {% endif %}
    </div>
  </div>
</header>
