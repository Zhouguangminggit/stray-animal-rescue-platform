{% extends "layouts/application.html" %}
{% block title %}{{ title }}{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'volunteers/css/community.css' %}">{% endblock %}

{% block content %}
<section class="site-container community-form">
  <span class="section-kicker">FORM</span>
  <h1>{{ title }}</h1>
  <form method="post"{% if multipart %} enctype="multipart/form-data"{% endif %}>
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn--wide" type="submit">{{ submit_label }}</button>
  </form>
</section>
{% endblock %}
