{% extends "layouts/application.html" %}
{% block title %}通知中心{% endblock %}
{% block content %}<section class="site-container"><h1>通知中心</h1>{% for item in page_obj %}<article><a href="{% url 'notifications:detail' item.pk %}">{{ item.title }}</a><p>{{ item.created_at }}</p>{% if not item.read_at %}<strong>未读</strong>{% endif %}</article>{% empty %}<p>暂无通知。</p>{% endfor %}</section>{% endblock %}
