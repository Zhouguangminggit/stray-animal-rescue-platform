{% extends "accounts/auth_base.html" %}

{% block auth_content %}
  <p class="eyebrow">安全验证</p>
  <h2>找回密码</h2>
  <p class="auth-lead">输入注册邮箱和收到的验证码。</p>
  <form method="post" class="auth-form">
    {% csrf_token %}
    {% include "accounts/form_fields.html" %}
    <button class="button button-wide" type="submit">验证并继续</button>
  </form>
  <p class="auth-switch"><a href="{% url 'accounts:login' %}">返回登录</a></p>
{% endblock %}
