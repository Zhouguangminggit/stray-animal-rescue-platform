{% extends "accounts/auth_base.html" %}

{% block auth_content %}
  <p class="eyebrow">欢迎回来</p>
  <h2>登录你的账号</h2>
  <p class="auth-lead">使用用户名、邮箱或手机号继续。</p>
  <form method="post" class="auth-form">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    {% include "accounts/form_fields.html" %}
    <div class="form-inline"><a href="{% url 'accounts:password_reset' %}">忘记密码？</a></div>
    <button class="button button-wide" type="submit">登录</button>
  </form>
  <p class="auth-switch">还没有账号？<a href="{% url 'accounts:register' %}">立即注册</a></p>
{% endblock %}
